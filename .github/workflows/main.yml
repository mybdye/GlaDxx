# GlaDxx 自动签到工作流
name: GlaDxx Checkin

on:
  # 手动触发
  workflow_dispatch:
  # 定时执行 (UTC时间，对应北京时间上午11:02)
  schedule:
    - cron: '02 3 * * *'
  # 代码推送时触发
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # 超时设置
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Delete old workflow runs
        uses: MajorScruffy/delete-old-workflow-runs@v0.3.0
        with:
          repository: ${{ github.repository }}   # replace this with your own repository such as >> owner/repo
          older-than-seconds: 604800          # remove all workflow runs older than 1 day >> 24*60*60=86400
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Execute checkin
        env:
          COOKIES: ${{ secrets.COOKIES }}
          BARK_TOKEN: ${{ secrets.BARK_TOKEN }}
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID: ${{ secrets.TG_USER_ID }}
        run: |
          python main.py
